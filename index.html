<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>StokSay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0c0e; --panel: #141518; --border: #222428;
  --accent: #e8ff47; --text: #f0f0f0; --muted: #555;
  --red: #ff5555; --green: #55ffaa; --radius: 14px;
}
body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; height:100dvh; display:flex; flex-direction:column; overflow:hidden; touch-action:none; }

header { display:flex; align-items:center; padding:13px 20px; border-bottom:1px solid var(--border); flex-shrink:0; gap:10px; }
.logo { font-size:19px; font-weight:800; letter-spacing:-.5px; margin-right:auto; }
.logo span { color:var(--accent); }
.icon-btn { width:34px; height:34px; border-radius:9px; border:1px solid var(--border); background:var(--panel); color:var(--text); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .2s; flex-shrink:0; }
.icon-btn:hover { border-color:var(--accent); }

/* ── MAIN: fullscreen canvas + bottom bar ── */
.view-wrap {
  flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column;
}

.canvas-wrap {
  flex:1; position:relative; background:#000;
  display:flex; align-items:center; justify-content:center; overflow:hidden;
}

#main-canvas { display:block; max-width:100%; max-height:100%; object-fit:contain; touch-action:none; }
#live-video   { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:none; }

/* Drop hint */
.drop-hint {
  position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; color:var(--muted); text-align:center; pointer-events:none; user-select:none;
}
.drop-hint .dicon { font-size:48px; opacity:.18; }
.drop-hint strong { font-size:16px; color:var(--text); font-weight:700; display:block; margin-bottom:3px; }
.drop-hint small { font-size:12px; }

/* Scan overlay */
.scan-overlay { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:20; background:rgba(11,12,14,.82); }
.scan-ring { width:44px; height:44px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .65s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }
.scan-text { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); }

/* Selection box */
#sel-canvas { position:absolute; inset:0; display:none; z-index:10; cursor:crosshair; touch-action:none; }

/* Step indicator */
.step-bar {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(11,12,14,.82); border:1px solid var(--border); border-radius:20px;
  padding:6px 16px; font-family:'Space Mono',monospace; font-size:11px; color:var(--muted);
  z-index:15; white-space:nowrap; backdrop-filter:blur(4px);
  display:none;
}
.step-bar.show { display:block; }
.step-bar b { color:var(--accent); }

/* Result badge */
.result-badge {
  position:absolute; top:12px; right:12px;
  background:var(--accent); color:#000;
  font-family:'Space Mono',monospace; font-size:13px; font-weight:700;
  padding:6px 14px; border-radius:20px; z-index:15;
  display:none;
}
.result-badge.show { display:block; }

/* Bottom bar */
.bottom-bar {
  flex-shrink:0; background:var(--panel); border-top:1px solid var(--border);
  padding:12px 16px; display:flex; flex-direction:column; gap:10px;
}

/* State: initial */
.bar-initial { display:flex; gap:10px; }
/* State: select */
.bar-select  { display:none; gap:10px; }
/* State: result */
.bar-result  { display:none; gap:10px; }

.btn { flex:1; padding:12px 14px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:border-color .2s,opacity .15s,transform .1s; display:flex; align-items:center; justify-content:center; gap:6px; }
.btn:hover:not(:disabled) { border-color:#3a3b3f; }
.btn:active:not(:disabled) { transform:scale(.97); }
.btn:disabled { opacity:.28; cursor:not-allowed; }
.btn-accent { background:var(--accent); color:#000; border-color:var(--accent); }
.btn-accent:hover:not(:disabled) { opacity:.85; }
.btn-red { border-color:#3a2020; color:var(--red); }
.btn-red:hover { border-color:var(--red); }

input[type=file] { display:none; }

/* Settings panel */
.settings-panel {
  position:fixed; inset:0; background:rgba(0,0,0,.7); z-index:100;
  display:none; align-items:flex-end;
}
.settings-panel.open { display:flex; }
.settings-sheet {
  background:var(--panel); border-top:1px solid var(--border); border-radius:20px 20px 0 0;
  padding:20px; width:100%; display:flex; flex-direction:column; gap:14px;
  max-height:80vh; overflow-y:auto;
}
.sheet-handle { width:36px; height:4px; background:var(--border); border-radius:4px; margin:0 auto 8px; }
.sheet-title { font-size:14px; font-weight:800; }
.setting-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:5px; }
.conf-row { display:flex; align-items:center; gap:10px; }
.conf-row input[type=range] { flex:1; accent-color:var(--accent); cursor:pointer; }
.conf-row span { font-family:'Space Mono',monospace; font-size:12px; color:var(--accent); min-width:36px; text-align:right; }
.s-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:'Space Mono',monospace; font-size:11px; padding:8px 12px; outline:none; transition:border-color .2s; }
.s-input:focus { border-color:var(--accent); }
.hint { font-size:10px; color:var(--muted); line-height:1.5; margin-top:3px; }
.save-btn { background:var(--accent); color:#000; border:none; border-radius:10px; padding:12px; font-family:'Syne',sans-serif; font-size:13px; font-weight:800; cursor:pointer; }

.notif { position:fixed; bottom:100px; left:50%; transform:translateX(-50%) translateY(8px); background:#18191d; border:1px solid var(--border); border-radius:10px; padding:9px 18px; font-size:11px; font-family:'Space Mono',monospace; color:var(--muted); z-index:999; opacity:0; transition:opacity .25s,transform .25s; pointer-events:none; white-space:nowrap; }
.notif.show { opacity:1; transform:translateX(-50%) translateY(0); }
.notif.ok  { border-color:var(--green); color:var(--green); }
.notif.err { border-color:var(--red); color:var(--red); }
</style>
</head>
<body>

<header>
  <div class="logo">Stok<span>Say</span></div>
  <button class="icon-btn" id="settings-btn">⚙️</button>
</header>

<div class="view-wrap">
  <div class="canvas-wrap" id="canvas-wrap">

    <div class="drop-hint" id="drop-hint">
      <div class="dicon">📦</div>
      <div>
        <strong>Fotoğraf çek veya yükle</strong>
        <small>Sonra saymak istediğin objeyi seç</small>
      </div>
    </div>

    <canvas id="main-canvas"></canvas>
    <canvas id="sel-canvas"></canvas>
    <video id="live-video" autoplay playsinline muted></video>

    <div class="step-bar" id="step-bar"></div>
    <div class="result-badge" id="result-badge"></div>

    <div class="scan-overlay" id="scan-overlay">
      <div class="scan-ring"></div>
      <div class="scan-text">Objeler aranıyor...</div>
    </div>
  </div>

  <div class="bottom-bar">
    <!-- ADIM 1: Fotoğraf yükle -->
    <div class="bar-initial" id="bar-initial">
      <button class="btn" id="cam-btn">📷 Kamera</button>
      <button class="btn" id="upload-btn">🗂 Yükle</button>
    </div>

    <!-- ADIM 2: Obje seç ve say -->
    <div class="bar-select" id="bar-select">
      <button class="btn btn-red" id="cancel-btn">✕ İptal</button>
      <button class="btn btn-accent" id="count-btn" disabled>🔍 Say</button>
    </div>

    <!-- ADIM 3: Sonuç -->
    <div class="bar-result" id="bar-result">
      <button class="btn" id="reselect-btn">↩ Tekrar Seç</button>
      <button class="btn" id="new-btn">📷 Yeni</button>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="image/jpeg,image/png,image/webp,image/bmp">

<!-- SETTINGS -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">Ayarlar</div>

    <div>
      <div class="setting-label">API Endpoint</div>
      <input class="s-input" type="text" id="api-url" placeholder="https://stoksay.aracservistakip.com/detect">
    </div>

    <div>
      <div class="setting-label">YOLO Güven Eşiği</div>
      <div class="conf-row">
        <input type="range" id="conf-slider" min="10" max="70" value="20" step="5">
        <span id="conf-val">20%</span>
      </div>
      <div class="hint">Düşük → daha fazla adayı tarar</div>
    </div>

    <div>
      <div class="setting-label">Benzerlik Eşiği</div>
      <div class="conf-row">
        <input type="range" id="sim-slider" min="30" max="85" value="55" step="5">
        <span id="sim-val">55%</span>
      </div>
      <div class="hint">Düşük → daha gevşek eşleşme</div>
    </div>

    <button class="save-btn" id="save-btn">💾 Kaydet</button>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ── CONFIG ───────────────────────────────────────────────────────
function loadCfg() { try { return JSON.parse(localStorage.getItem('stoksay_v5') || '{}'); } catch { return {}; } }
function saveCfg(c) { localStorage.setItem('stoksay_v5', JSON.stringify(c)); }
let cfg = loadCfg();
if (!cfg.apiUrl) cfg.apiUrl = window.location.origin + '/detect';
if (!cfg.conf)   cfg.conf   = 20;
if (!cfg.sim)    cfg.sim    = 55;

// ── REFS ─────────────────────────────────────────────────────────
const canvasWrap  = document.getElementById('canvas-wrap');
const mainCanvas  = document.getElementById('main-canvas');
const mCtx        = mainCanvas.getContext('2d');
const selCanvas   = document.getElementById('sel-canvas');
const sCtx        = selCanvas.getContext('2d');
const liveVideo   = document.getElementById('live-video');
const dropHint    = document.getElementById('drop-hint');
const scanOverlay = document.getElementById('scan-overlay');
const stepBar     = document.getElementById('step-bar');
const resultBadge = document.getElementById('result-badge');
const fileInput   = document.getElementById('file-input');

// Bottom bars
const barInitial  = document.getElementById('bar-initial');
const barSelect   = document.getElementById('bar-select');
const barResult   = document.getElementById('bar-result');

const camBtn      = document.getElementById('cam-btn');
const uploadBtn   = document.getElementById('upload-btn');
const cancelBtn   = document.getElementById('cancel-btn');
const countBtn    = document.getElementById('count-btn');
const reselectBtn = document.getElementById('reselect-btn');
const newBtn      = document.getElementById('new-btn');

const settingsBtn   = document.getElementById('settings-btn');
const settingsPanel = document.getElementById('settings-panel');
const apiUrlInput   = document.getElementById('api-url');
const confSlider    = document.getElementById('conf-slider');
const confVal       = document.getElementById('conf-val');
const simSlider     = document.getElementById('sim-slider');
const simVal        = document.getElementById('sim-val');
const saveSettBtn   = document.getElementById('save-btn');
const notifEl       = document.getElementById('notif');

// ── STATE ─────────────────────────────────────────────────────────
let currentImg  = null;  // HTMLImageElement
let camStream   = null;
let isLive      = false;
let isSelecting = false;
let selStart    = null;  // {x, y} canvas coords
let selRect     = null;  // {x, y, w, h} canvas coords

// ── NOTIF ────────────────────────────────────────────────────────
let nTimer;
function notif(msg, cls='') {
  notifEl.textContent = msg; notifEl.className = 'notif show ' + cls;
  clearTimeout(nTimer); nTimer = setTimeout(() => notifEl.classList.remove('show'), 3000);
}

// ── SETTINGS ─────────────────────────────────────────────────────
function initSettings() {
  apiUrlInput.value = cfg.apiUrl;
  confSlider.value  = cfg.conf; confVal.textContent = cfg.conf + '%';
  simSlider.value   = cfg.sim;  simVal.textContent  = cfg.sim + '%';
}
confSlider.addEventListener('input', () => confVal.textContent = confSlider.value + '%');
simSlider.addEventListener('input',  () => simVal.textContent  = simSlider.value + '%');
settingsBtn.addEventListener('click', () => settingsPanel.classList.add('open'));
settingsPanel.addEventListener('click', e => { if (e.target === settingsPanel) settingsPanel.classList.remove('open'); });
saveSettBtn.addEventListener('click', () => {
  cfg.apiUrl = apiUrlInput.value.trim();
  cfg.conf   = +confSlider.value;
  cfg.sim    = +simSlider.value;
  saveCfg(cfg);
  settingsPanel.classList.remove('open');
  notif('Kaydedildi', 'ok');
});

// ── STATE MACHINE ─────────────────────────────────────────────────
// States: 'empty' | 'loaded' | 'result'
function setState(state) {
  barInitial.style.display = 'none';
  barSelect.style.display  = 'none';
  barResult.style.display  = 'none';

  if (state === 'empty') {
    barInitial.style.display = 'flex';
    stepBar.classList.remove('show');
    resultBadge.classList.remove('show');
    selCanvas.style.display = 'none';
  } else if (state === 'loaded') {
    barSelect.style.display = 'flex';
    stepBar.innerHTML = '<b>Bir objeyi çiz</b> → Say';
    stepBar.classList.add('show');
    resultBadge.classList.remove('show');
    selCanvas.style.display = 'block';
    countBtn.disabled = true;
    selRect = null;
    redrawSel();
  } else if (state === 'result') {
    barResult.style.display = 'flex';
    stepBar.classList.remove('show');
    selCanvas.style.display = 'none';
  }
}

// ── IMAGE LOAD ────────────────────────────────────────────────────
function loadImageEl(imgEl) {
  stopCamera();
  currentImg = imgEl;

  // Canvas boyutunu görüntüye göre ayarla
  const wrapW = canvasWrap.clientWidth  || window.innerWidth;
  const wrapH = canvasWrap.clientHeight || window.innerHeight * 0.7;
  const scale = Math.min(wrapW / imgEl.naturalWidth, wrapH / imgEl.naturalHeight, 1);

  mainCanvas.width  = Math.round(imgEl.naturalWidth  * scale);
  mainCanvas.height = Math.round(imgEl.naturalHeight * scale);
  selCanvas.width   = mainCanvas.width;
  selCanvas.height  = mainCanvas.height;

  mCtx.drawImage(imgEl, 0, 0, mainCanvas.width, mainCanvas.height);
  dropHint.style.display = 'none';
  setState('loaded');
}

function fileToImg(file) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = rej; img.src = url;
  });
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  try { loadImageEl(await fileToImg(f)); } catch { notif('Görsel yüklenemedi', 'err'); }
  fileInput.value = '';
});

// ── CAMERA ────────────────────────────────────────────────────────
camBtn.addEventListener('click', async () => {
  if (isLive) { captureFromLive(); return; }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:1920}, height:{ideal:1080} },
      audio: false
    });
    liveVideo.srcObject = camStream;
    liveVideo.style.display = 'block';
    mainCanvas.style.display = 'none';
    dropHint.style.display   = 'none';
    isLive = true;
    camBtn.textContent = '📸 Çek';
    barInitial.style.display = 'flex';
  } catch { notif('Kamera izni reddedildi', 'err'); }
});

function captureFromLive() {
  const w = liveVideo.videoWidth, h = liveVideo.videoHeight;
  const tmp = document.createElement('canvas'); tmp.width=w; tmp.height=h;
  tmp.getContext('2d').drawImage(liveVideo, 0, 0);
  const img = new Image();
  img.onload = () => { mainCanvas.style.display = 'block'; loadImageEl(img); };
  img.src = tmp.toDataURL('image/jpeg', .92);
  stopCamera();
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t=>t.stop()); camStream=null; }
  liveVideo.style.display = 'none';
  mainCanvas.style.display = 'block';
  isLive = false;
  camBtn.innerHTML = '📷 Kamera';
}

// ── SELECTION (mouse + touch) ─────────────────────────────────────
function getCanvasPos(e) {
  const rect = selCanvas.getBoundingClientRect();
  const scaleX = selCanvas.width  / rect.width;
  const scaleY = selCanvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

function redrawSel() {
  sCtx.clearRect(0, 0, selCanvas.width, selCanvas.height);
  if (!selRect) return;
  const { x, y, w, h } = selRect;

  // Yarı saydam overlay — dışarısını karart
  sCtx.fillStyle = 'rgba(0,0,0,0.45)';
  sCtx.fillRect(0, 0, selCanvas.width, selCanvas.height);
  sCtx.clearRect(x, y, w, h);

  // Seçim kenarlığı
  sCtx.strokeStyle = '#e8ff47';
  sCtx.lineWidth   = 2;
  sCtx.strokeRect(x, y, w, h);

  // Köşe L-bracket
  const cs = Math.min(Math.abs(w), Math.abs(h)) * .15;
  sCtx.lineWidth = 3;
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy], i) => {
    sCtx.beginPath();
    sCtx.moveTo(cx + (i%2===0 ? cs : -cs), cy);
    sCtx.lineTo(cx, cy);
    sCtx.lineTo(cx, cy + (i<2 ? cs : -cs));
    sCtx.stroke();
  });
}

function onPointerDown(e) {
  e.preventDefault();
  isSelecting = true;
  selStart = getCanvasPos(e);
  selRect  = null;
  countBtn.disabled = true;
  redrawSel();
}

function onPointerMove(e) {
  if (!isSelecting) return;
  e.preventDefault();
  const pos = getCanvasPos(e);
  selRect = {
    x: Math.min(selStart.x, pos.x),
    y: Math.min(selStart.y, pos.y),
    w: Math.abs(pos.x - selStart.x),
    h: Math.abs(pos.y - selStart.y),
  };
  redrawSel();
}

function onPointerUp(e) {
  if (!isSelecting) return;
  e.preventDefault();
  isSelecting = false;
  if (selRect && selRect.w > 10 && selRect.h > 10) {
    countBtn.disabled = false;
    stepBar.innerHTML = 'Obje seçildi → <b>Say</b>';
  } else {
    selRect = null;
    redrawSel();
    stepBar.innerHTML = '<b>Bir objeyi çiz</b> → Say';
  }
}

selCanvas.addEventListener('mousedown',  onPointerDown);
selCanvas.addEventListener('mousemove',  onPointerMove);
selCanvas.addEventListener('mouseup',    onPointerUp);
selCanvas.addEventListener('touchstart', onPointerDown, { passive: false });
selCanvas.addEventListener('touchmove',  onPointerMove, { passive: false });
selCanvas.addEventListener('touchend',   onPointerUp,   { passive: false });

// ── CANCEL / RESELECT / NEW ───────────────────────────────────────
cancelBtn.addEventListener('click', () => {
  if (currentImg) {
    mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
    mCtx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);
  }
  setState('empty');
  dropHint.style.display = 'flex';
  currentImg = null;
});

reselectBtn.addEventListener('click', () => {
  // Görseli sıfırla, tekrar seçim yap
  mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
  mCtx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);
  setState('loaded');
});

newBtn.addEventListener('click', () => {
  cancelBtn.click();
});

// ── COUNT ─────────────────────────────────────────────────────────
countBtn.addEventListener('click', async () => {
  if (!selRect || !currentImg) return;

  scanOverlay.style.display = 'flex';
  countBtn.disabled = true;

  try {
    // Ana görseli blob olarak al
    const mainBlob = await new Promise(res => mainCanvas.toBlob(res, 'image/jpeg', .92));

    // Seçilen alanı crop et
    const cropCanvas = document.createElement('canvas');
    cropCanvas.width  = Math.round(selRect.w);
    cropCanvas.height = Math.round(selRect.h);
    cropCanvas.getContext('2d').drawImage(
      mainCanvas,
      selRect.x, selRect.y, selRect.w, selRect.h,
      0, 0, selRect.w, selRect.h
    );
    const cropBlob = await new Promise(res => cropCanvas.toBlob(res, 'image/jpeg', .92));

    const fd = new FormData();
    fd.append('image',      mainBlob, 'frame.jpg');
    fd.append('reference',  cropBlob, 'ref.jpg');
    fd.append('confidence', (cfg.conf / 100).toString());
    fd.append('similarity',  (cfg.sim  / 100).toString());

    const t0  = Date.now();
    const res = await fetch(cfg.apiUrl, { method:'POST', body:fd });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const elapsed = Date.now() - t0;

    drawDetections(data.detections || [], data.image_size);

    resultBadge.textContent = `${data.count} adet`;
    resultBadge.classList.add('show');
    setState('result');
    notif(`${data.count} obje bulundu (${elapsed}ms)`, 'ok');

  } catch(e) {
    notif('Hata: ' + e.message, 'err');
    countBtn.disabled = false;
  } finally {
    scanOverlay.style.display = 'none';
  }
});

// ── DRAW ─────────────────────────────────────────────────────────
function drawDetections(detections, imageSize) {
  // Orijinal görüntüyü yeniden çiz
  mCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
  mCtx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);

  const scaleX = mainCanvas.width  / imageSize[0];
  const scaleY = mainCanvas.height / imageSize[1];

  detections.forEach((det, i) => {
    const [x, y, w, h] = det.bbox;
    const sx = x*scaleX, sy = y*scaleY, sw = w*scaleX, sh = h*scaleY;
    const cx = sx + sw/2, cy = sy + sh/2;
    const num = i + 1;
    const lw  = Math.max(1.5, mainCanvas.width / 600);

    // Dolgu
    mCtx.fillStyle = 'rgba(74,144,255,0.18)';
    mCtx.fillRect(sx, sy, sw, sh);

    // Kenarlık
    mCtx.strokeStyle = '#4A90FF';
    mCtx.lineWidth   = lw * 1.5;
    mCtx.strokeRect(sx+lw/2, sy+lw/2, sw-lw, sh-lw);

    // Numara balonu
    const r = Math.max(11, Math.min(sw, sh) * .28);
    mCtx.beginPath(); mCtx.arc(cx, cy, r, 0, Math.PI*2);
    mCtx.fillStyle = '#4A90FF'; mCtx.fill();
    mCtx.strokeStyle = 'rgba(255,255,255,.9)';
    mCtx.lineWidth = Math.max(1.5, r*.12); mCtx.stroke();

    const fs = Math.max(8, Math.round(r * 1.05));
    mCtx.font = `800 ${fs}px Space Mono, monospace`;
    mCtx.fillStyle = '#fff'; mCtx.textAlign = 'center'; mCtx.textBaseline = 'middle';
    mCtx.shadowColor = 'rgba(0,0,0,.4)'; mCtx.shadowBlur = 3;
    mCtx.fillText(String(num), cx, cy + 1);
    mCtx.shadowBlur = 0; mCtx.textAlign = 'left'; mCtx.textBaseline = 'alphabetic';
  });
}

// ── BOOT ─────────────────────────────────────────────────────────
initSettings();
setState('empty');
</script>
