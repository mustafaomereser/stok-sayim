<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>StokSay</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b0c0e;
  --panel: #141518;
  --panel2: #1a1b1f;
  --border: #222428;
  --accent: #e8ff47;
  --text: #f0f0f0;
  --muted: #555;
  --red: #ff5555;
  --green: #55ffaa;
  --radius: 14px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Syne', sans-serif;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.logo { font-size: 19px; font-weight: 800; letter-spacing: -.5px; margin-right: auto; }
.logo span { color: var(--accent); }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s, background .2s;
  flex-shrink: 0;
}
.icon-btn:hover { border-color: var(--accent); }
.icon-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── LAYOUT ── */
main {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 300px;
  min-height: 0;
  overflow: hidden;
}

/* ── LEFT: IMAGE/CAMERA ── */
.view-area {
  display: flex;
  flex-direction: column;
  padding: 18px;
  gap: 14px;
  min-height: 0;
}

.canvas-wrap {
  flex: 1;
  position: relative;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #0d0e10;
  cursor: pointer;
  transition: border-color .2s;
  min-height: 0;
}
.canvas-wrap.has-content { border-color: transparent; cursor: default; }
.canvas-wrap:not(.has-content):hover { border-color: var(--accent); }

.drop-hint {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  color: var(--muted); text-align: center; pointer-events: none; user-select: none;
}
.drop-hint .dicon { font-size: 40px; opacity: .2; }
.drop-hint strong { font-size: 15px; color: var(--text); font-weight: 700; display: block; margin-bottom: 3px; }
.drop-hint small { font-size: 12px; }

#main-canvas { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; display: none; }
#live-video   { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

/* overlay */
.scan-overlay {
  position: absolute; inset: 0;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; z-index: 10;
  background: rgba(11,12,14,.8);
  border-radius: calc(var(--radius) - 2px);
}
.scan-ring {
  width: 48px; height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .65s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.scan-text { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

/* live scan line */
.scan-line {
  position: absolute; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  display: none;
  animation: scanline 2s ease-in-out infinite;
  z-index: 5;
}
@keyframes scanline {
  0%   { top: 10%; opacity: 0; }
  10%  { opacity: 1; }
  90%  { opacity: 1; }
  100% { top: 90%; opacity: 0; }
}

/* corner brackets */
.bracket {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--accent); border-style: solid;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 4;
}
.bracket.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
.bracket.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
.bracket.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
.bracket.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }
.canvas-wrap.has-content .bracket { opacity: 1; }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 10px; flex-shrink: 0; }
.btn {
  flex: 1; padding: 12px 14px;
  border-radius: var(--radius); border: 1px solid var(--border);
  background: var(--panel); color: var(--text);
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
  cursor: pointer; transition: border-color .2s, opacity .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 7px;
}
.btn:hover:not(:disabled) { border-color: #3a3b3f; }
.btn:active:not(:disabled) { transform: scale(.97); }
.btn:disabled { opacity: .28; cursor: not-allowed; }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-size: 14px; }
.btn-accent:hover:not(:disabled) { opacity: .85; border-color: var(--accent); }
.btn-red { background: transparent; color: var(--red); border-color: #3a2020; }
.btn-red:hover:not(:disabled) { border-color: var(--red); }

input[type=file] { display: none; }

/* ── RIGHT PANEL ── */
.right-panel {
  background: var(--panel);
  border-left: 1px solid var(--border);
  display: flex; flex-direction: column;
  min-height: 0; overflow: hidden;
}

/* tabs */
.tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.tab {
  flex: 1; padding: 13px 8px; font-size: 11px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .6px; cursor: pointer;
  color: var(--muted); border: none; background: none;
  border-bottom: 2px solid transparent; transition: color .2s, border-color .2s;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.tab-content { flex: 1; overflow-y: auto; display: none; flex-direction: column; }
.tab-content.active { display: flex; }
.tab-content::-webkit-scrollbar { width: 3px; }
.tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* results tab */
.results-header {
  padding: 14px 16px 10px;
  display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
}
.total-badge {
  background: var(--accent); color: #000;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  padding: 3px 10px; border-radius: 20px;
}
.results-meta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); }

.results-list { flex: 1; padding: 0 12px 12px; display: flex; flex-direction: column; gap: 7px; }

.empty-state {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--muted); font-size: 12px; text-align: center; line-height: 1.9; padding: 28px 16px; gap: 8px;
}
.empty-state .ei { font-size: 28px; opacity: .18; }

.obj-card {
  background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 12px; display: flex; align-items: center; gap: 10px;
  animation: fadeUp .18s ease; cursor: pointer; transition: border-color .15s;
}
.obj-card:hover { border-color: #333; }
@keyframes fadeUp { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.obj-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
.obj-name { flex: 1; font-size: 12px; font-weight: 700; text-transform: capitalize; }
.obj-count { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; line-height: 1; }
.obj-unit  { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); text-align: right; margin-top: 1px; }

/* settings tab */
.settings-body { padding: 14px; display: flex; flex-direction: column; gap: 14px; }
.setting-group { display: flex; flex-direction: column; gap: 8px; }
.setting-label { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); }

.api-input-wrap { position: relative; }
.api-input-wrap input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-family: 'Space Mono', monospace; font-size: 11px;
  padding: 9px 36px 9px 12px; outline: none; transition: border-color .2s;
}
.api-input-wrap input:focus { border-color: var(--accent); }
.api-input-wrap input::placeholder { color: var(--muted); }
.api-test-btn {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--muted); font-size: 14px; cursor: pointer;
  transition: color .2s;
}
.api-test-btn:hover { color: var(--accent); }

.class-list { display: flex; flex-direction: column; gap: 5px; max-height: 180px; overflow-y: auto; }
.class-list::-webkit-scrollbar { width: 3px; }
.class-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.class-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 10px; animation: fadeUp .15s ease;
}
.class-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.class-name { flex: 1; font-size: 12px; font-weight: 600; text-transform: capitalize; }
.class-del { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; line-height: 1; transition: color .15s; padding: 0 2px; }
.class-del:hover { color: var(--red); }

.add-class-row { display: flex; gap: 8px; }
.add-class-row input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
  padding: 8px 12px; outline: none; transition: border-color .2s;
}
.add-class-row input:focus { border-color: var(--accent); }
.add-class-row input::placeholder { color: var(--muted); font-weight: 400; }
.add-btn {
  background: var(--accent); color: #000; border: none; border-radius: 9px;
  width: 34px; font-size: 18px; font-weight: 700; cursor: pointer;
  transition: opacity .15s; flex-shrink: 0;
}
.add-btn:hover { opacity: .82; }

.conf-row { display: flex; align-items: center; gap: 10px; }
.conf-row input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
.conf-row span { font-family: 'Space Mono', monospace; font-size: 12px; color: var(--accent); min-width: 32px; text-align: right; }

.save-btn {
  background: var(--accent); color: #000; border: none; border-radius: 10px;
  padding: 11px; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; transition: opacity .15s;
}
.save-btn:hover { opacity: .85; }

/* notif */
.notif {
  position: fixed; bottom: 18px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: #18191d; border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 18px;
  font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted);
  z-index: 999; opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; white-space: nowrap;
}
.notif.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.notif.ok  { border-color: var(--green); color: var(--green); }
.notif.err { border-color: var(--red); color: var(--red); }

/* MOBILE */
@media (max-width: 660px) {
  body { overflow: auto; }
  main { grid-template-columns: 1fr; grid-template-rows: 55vw auto; }
  .right-panel { border-left: none; border-top: 1px solid var(--border); max-height: 380px; }
  .view-area { padding: 12px; gap: 10px; }
  header { padding: 12px 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Stok<span>Say</span></div>
  <button class="icon-btn" id="settings-toggle" title="Ayarlar">⚙️</button>
</header>

<main>
  <!-- SOL -->
  <div class="view-area">
    <div class="canvas-wrap" id="canvas-wrap">
      <div class="bracket tl"></div>
      <div class="bracket tr"></div>
      <div class="bracket bl"></div>
      <div class="bracket br"></div>
      <div class="scan-line" id="scan-line"></div>

      <div class="drop-hint" id="drop-hint">
        <div class="dicon">📦</div>
        <div>
          <strong>Fotoğraf yükle veya sürükle</strong>
          <small>ya da kameradan çek</small>
        </div>
      </div>

      <canvas id="main-canvas"></canvas>
      <video id="live-video" autoplay playsinline muted></video>

      <div class="scan-overlay" id="scan-overlay">
        <div class="scan-ring"></div>
        <div class="scan-text" id="scan-text">Analiz ediliyor...</div>
      </div>
    </div>

    <div class="action-row">
      <button class="btn" id="cam-btn">📷 Kamera</button>
      <button class="btn" id="upload-btn">🗂 Yükle</button>
      <button class="btn btn-accent" id="analyze-btn" disabled>🔍 Say</button>
    </div>
    <input type="file" id="file-input" accept="image/*">
  </div>

  <!-- SAĞ -->
  <div class="right-panel" id="right-panel">
    <div class="tabs">
      <button class="tab active" data-tab="results">Sonuçlar</button>
      <button class="tab" data-tab="settings">⚙ Ayarlar</button>
    </div>

    <!-- RESULTS -->
    <div class="tab-content active" id="tab-results">
      <div class="results-header">
        <div class="total-badge" id="total-badge">0 adet</div>
        <div class="results-meta" id="results-meta">—</div>
      </div>
      <div class="results-list" id="results-list">
        <div class="empty-state">
          <div class="ei">🔎</div>
          Fotoğraf yükle ve<br>"Say" butonuna bas.
        </div>
      </div>
    </div>

    <!-- SETTINGS -->
    <div class="tab-content" id="tab-settings">
      <div class="settings-body">

        <div class="setting-group">
          <div class="setting-label">API Endpoint</div>
          <div class="api-input-wrap">
            <input type="text" id="api-url" placeholder="http://localhost:8000/detect" autocomplete="off">
            <button class="api-test-btn" id="api-test-btn" title="Bağlantıyı test et">⚡</button>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">Güven Eşiği</div>
          <div class="conf-row">
            <input type="range" id="conf-slider" min="10" max="90" value="40" step="5">
            <span id="conf-val">40%</span>
          </div>
        </div>

        <div class="setting-group">
          <div class="setting-label">Sınıf Listesi <span style="color:var(--muted);font-size:10px;text-transform:none;font-weight:400">(YOLO-World'e gönderilir)</span></div>
          <div class="class-list" id="class-list"></div>
          <div class="add-class-row">
            <input type="text" id="class-input" placeholder="ör: somun, röle, yağ kutusu" maxlength="40">
            <button class="add-btn" id="add-class-btn">+</button>
          </div>
        </div>

        <button class="save-btn" id="save-settings">💾 Kaydet</button>

      </div>
    </div>
  </div>
</main>

<div class="notif" id="notif"></div>

<script>
// ── PALETTE ─────────────────────────────────────────────────────
const PALETTE = [
  '#e8ff47','#47b8ff','#ff6b6b','#6bffb8','#ff9f47','#c47bff',
  '#ff47c4','#47ffd4','#ffcc47','#7baaff','#ff7b7b','#47ffaa',
  '#d4ff47','#7bf0ff','#ffb347','#aa47ff','#ff4790','#47d4ff',
  '#b8ff47','#ff8c47','#f0ff47','#47ffb8'
];
const colorMap = {}; let colorIdx = 0;
function getColor(k) {
  k = k.toLowerCase().trim();
  if (!colorMap[k]) colorMap[k] = PALETTE[colorIdx++ % PALETTE.length];
  return colorMap[k];
}
function resetColors() { Object.keys(colorMap).forEach(k => delete colorMap[k]); colorIdx = 0; }

// ── STATE ────────────────────────────────────────────────────────
let currentImg  = null;
let camStream   = null;
let isLive      = false;
let liveTimer   = null;

const DEFAULT_CLASSES = ['somun','vida','röle','motor yağı','filtre','conta','kablo','sigorta','pul','cıvata'];

// ── CONFIG (localStorage) ────────────────────────────────────────
function loadConfig() {
  try { return JSON.parse(localStorage.getItem('stoksay_cfg') || '{}'); } catch { return {}; }
}
function saveConfig(cfg) { localStorage.setItem('stoksay_cfg', JSON.stringify(cfg)); }

let cfg = loadConfig();
if (!cfg.apiUrl)    cfg.apiUrl    = 'http://localhost:8000/detect';
if (!cfg.classes)   cfg.classes   = [...DEFAULT_CLASSES];
if (!cfg.conf)      cfg.conf      = 40;

// ── REFS ─────────────────────────────────────────────────────────
const canvasWrap   = document.getElementById('canvas-wrap');
const mainCanvas   = document.getElementById('main-canvas');
const ctx          = mainCanvas.getContext('2d');
const liveVideo    = document.getElementById('live-video');
const dropHint     = document.getElementById('drop-hint');
const scanOverlay  = document.getElementById('scan-overlay');
const scanText     = document.getElementById('scan-text');
const scanLine     = document.getElementById('scan-line');
const fileInput    = document.getElementById('file-input');
const uploadBtn    = document.getElementById('upload-btn');
const analyzeBtn   = document.getElementById('analyze-btn');
const camBtn       = document.getElementById('cam-btn');
const resultsList  = document.getElementById('results-list');
const totalBadge   = document.getElementById('total-badge');
const resultsMeta  = document.getElementById('results-meta');
const notifEl      = document.getElementById('notif');
const apiUrlInput  = document.getElementById('api-url');
const apiTestBtn   = document.getElementById('api-test-btn');
const confSlider   = document.getElementById('conf-slider');
const confVal      = document.getElementById('conf-val');
const classListEl  = document.getElementById('class-list');
const classInput   = document.getElementById('class-input');
const addClassBtn  = document.getElementById('add-class-btn');
const saveBtn      = document.getElementById('save-settings');
const settingsToggle = document.getElementById('settings-toggle');

// ── NOTIF ────────────────────────────────────────────────────────
let nTimer;
function notif(msg, cls = '') {
  notifEl.textContent = msg;
  notifEl.className = 'notif show ' + cls;
  clearTimeout(nTimer);
  nTimer = setTimeout(() => notifEl.classList.remove('show'), 3200);
}

// ── TABS ─────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
  });
});

settingsToggle.addEventListener('click', () => {
  const tab = document.querySelector('.tab[data-tab="settings"]');
  if (tab) tab.click();
});

// ── SETTINGS INIT ────────────────────────────────────────────────
function initSettings() {
  apiUrlInput.value = cfg.apiUrl;
  confSlider.value  = cfg.conf;
  confVal.textContent = cfg.conf + '%';
  renderClassList();
}

confSlider.addEventListener('input', () => {
  confVal.textContent = confSlider.value + '%';
});

function renderClassList() {
  classListEl.innerHTML = '';
  cfg.classes.forEach((cls, i) => {
    const color = getColor(cls);
    const item = document.createElement('div');
    item.className = 'class-item';
    item.innerHTML = `
      <div class="class-dot" style="background:${color}"></div>
      <div class="class-name">${cls}</div>
      <button class="class-del" data-i="${i}">×</button>`;
    classListEl.appendChild(item);
  });
  classListEl.querySelectorAll('.class-del').forEach(btn => {
    btn.addEventListener('click', () => {
      cfg.classes.splice(+btn.dataset.i, 1);
      renderClassList();
    });
  });
}

function addClass(name) {
  name = name.trim().toLowerCase();
  if (!name) return;
  if (cfg.classes.includes(name)) return notif('Zaten var: ' + name, 'err');
  cfg.classes.push(name);
  renderClassList();
  classInput.value = '';
  classInput.focus();
}

addClassBtn.addEventListener('click', () => addClass(classInput.value));
classInput.addEventListener('keydown', e => { if (e.key === 'Enter') addClass(classInput.value); });

saveBtn.addEventListener('click', () => {
  cfg.apiUrl = apiUrlInput.value.trim();
  cfg.conf   = +confSlider.value;
  saveConfig(cfg);
  notif('Ayarlar kaydedildi', 'ok');
});

// API test
apiTestBtn.addEventListener('click', async () => {
  const url = apiUrlInput.value.trim();
  if (!url) return notif('URL gir önce', 'err');
  try {
    apiTestBtn.textContent = '⏳';
    const r = await fetch(url.replace(/\/detect$/, '/health'), { method: 'GET', signal: AbortSignal.timeout(4000) });
    notif(r.ok ? 'Bağlantı başarılı ✓' : 'HTTP ' + r.status, r.ok ? 'ok' : 'err');
  } catch(e) {
    notif('Bağlanamadı: ' + e.message, 'err');
  } finally {
    apiTestBtn.textContent = '⚡';
  }
});

// ── IMAGE LOAD ────────────────────────────────────────────────────
function loadImageEl(imgEl) {
  stopCamera();
  currentImg = imgEl;
  resetColors();

  const wrap = canvasWrap.getBoundingClientRect();
  const scale = Math.min(
    (wrap.width  || 600) / imgEl.naturalWidth,
    (wrap.height || 400) / imgEl.naturalHeight,
    1
  );
  mainCanvas.width  = Math.round(imgEl.naturalWidth  * scale);
  mainCanvas.height = Math.round(imgEl.naturalHeight * scale);
  ctx.drawImage(imgEl, 0, 0, mainCanvas.width, mainCanvas.height);

  mainCanvas.style.display = 'block';
  liveVideo.style.display  = 'none';
  dropHint.style.display   = 'none';
  canvasWrap.classList.add('has-content');
  analyzeBtn.disabled = false;

  resultsList.innerHTML = `<div class="empty-state"><div class="ei">🔎</div>"Say" butonuna bas.</div>`;
  totalBadge.textContent = '0 adet';
  resultsMeta.textContent = '—';
}

function fileToImg(file) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { URL.revokeObjectURL(url); res(img); };
    img.onerror = rej;
    img.src = url;
  });
}

uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', async e => {
  const f = e.target.files[0]; if (!f) return;
  try { loadImageEl(await fileToImg(f)); } catch { notif('Görsel yüklenemedi', 'err'); }
  fileInput.value = '';
});

canvasWrap.addEventListener('dragover', e => {
  e.preventDefault();
  if (!canvasWrap.classList.contains('has-content')) canvasWrap.style.borderColor = 'var(--accent)';
});
canvasWrap.addEventListener('dragleave', () => canvasWrap.style.borderColor = '');
canvasWrap.addEventListener('drop', async e => {
  e.preventDefault(); canvasWrap.style.borderColor = '';
  const f = e.dataTransfer.files[0];
  if (!f || !f.type.startsWith('image/')) return notif('Sadece görsel yüklenebilir', 'err');
  try { loadImageEl(await fileToImg(f)); } catch { notif('Görsel yüklenemedi', 'err'); }
});
canvasWrap.addEventListener('click', () => {
  if (!canvasWrap.classList.contains('has-content') && !isLive) fileInput.click();
});

// ── CAMERA ────────────────────────────────────────────────────────
camBtn.addEventListener('click', async () => {
  if (isLive) {
    // Canlı modda "Çek" gibi davran
    captureFromLive();
    return;
  }
  try {
    camStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } },
      audio: false
    });
    liveVideo.srcObject = camStream;
    liveVideo.style.display = 'block';
    mainCanvas.style.display = 'none';
    dropHint.style.display   = 'none';
    canvasWrap.classList.add('has-content');
    scanLine.style.display = 'block';
    isLive = true;
    camBtn.textContent = '📸 Çek';
    camBtn.style.borderColor = 'var(--accent)';
    analyzeBtn.disabled = false;
  } catch { notif('Kamera izni reddedildi', 'err'); }
});

function captureFromLive() {
  const w = liveVideo.videoWidth, h = liveVideo.videoHeight;
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  tmp.getContext('2d').drawImage(liveVideo, 0, 0);
  const img = new Image();
  img.onload = () => loadImageEl(img);
  img.src = tmp.toDataURL('image/jpeg', .92);
  stopCamera();
}

function stopCamera() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  if (liveTimer) { clearInterval(liveTimer); liveTimer = null; }
  liveVideo.style.display = 'none';
  scanLine.style.display  = 'none';
  isLive = false;
  camBtn.innerHTML = '📷 Kamera';
  camBtn.style.borderColor = '';
}

// ── ANALYZE ───────────────────────────────────────────────────────
analyzeBtn.addEventListener('click', analyze);

async function analyze() {
  if (!currentImg && !isLive) return;

  // Eğer live ise önce yakala
  if (isLive) { captureFromLive(); return; }

  const apiUrl = cfg.apiUrl;
  if (!apiUrl) return notif('Ayarlar\'dan API URL gir', 'err');

  scanOverlay.style.display = 'flex';
  scanText.textContent = 'API\'ye gönderiliyor...';
  analyzeBtn.disabled = true;

  try {
    // Canvas'tan blob al
    const blob = await new Promise(res => mainCanvas.toBlob(res, 'image/jpeg', .92));
    const formData = new FormData();
    formData.append('image', blob, 'frame.jpg');
    formData.append('classes', cfg.classes.join(','));
    formData.append('confidence', (cfg.conf / 100).toString());

    scanText.textContent = 'Model çalışıyor...';
    const t0 = Date.now();
    const res = await fetch(apiUrl, { method: 'POST', body: formData });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err}`);
    }

    const data = await res.json();
    const elapsed = Date.now() - t0;

    /*
      Beklenen response formatı:
      {
        "detections": [
          { "label": "somun", "confidence": 0.87, "bbox": [x, y, w, h] },
          ...
        ]
      }
    */
    const detections = data.detections || [];
    drawDetections(detections);
    renderResults(detections, elapsed);

  } catch (e) {
    // ── DEMO MODU: API yokken sahte data göster ──────────────────
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('ECONNREFUSED')) {
      notif('API bağlantısı yok — Demo modu', 'err');
      runDemoMode();
    } else {
      notif('Hata: ' + e.message, 'err');
      console.error(e);
    }
  } finally {
    scanOverlay.style.display = 'none';
    analyzeBtn.disabled = false;
  }
}

// ── DEMO MODE (API olmadan test için) ─────────────────────────────
function runDemoMode() {
  const W = mainCanvas.width, H = mainCanvas.height;
  const fakeClasses = cfg.classes.slice(0, 4);
  const fakeDetections = [];
  fakeClasses.forEach((cls, ci) => {
    const count = Math.floor(Math.random() * 4) + 1;
    for (let i = 0; i < count; i++) {
      const bw = W * (.1 + Math.random()*.12), bh = H * (.1 + Math.random()*.12);
      const bx = Math.random() * (W - bw), by = Math.random() * (H - bh);
      fakeDetections.push({ label: cls, confidence: .7 + Math.random()*.28, bbox: [bx, by, bw, bh] });
    }
  });
  drawDetections(fakeDetections);
  renderResults(fakeDetections, 0, true);
}

// ── DRAW BOUNDING BOXES ───────────────────────────────────────────
function drawDetections(detections) {
  // Orijinal görüntüyü yeniden çiz
  ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
  ctx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);

  resetColors();

  detections.forEach(det => {
    const color = getColor(det.label);
    let [x, y, w, h] = det.bbox;

    // Normalize: eğer 0-1 arasındaysa pixel'e çevir
    if (x <= 1 && y <= 1 && w <= 1 && h <= 1) {
      x *= mainCanvas.width; y *= mainCanvas.height;
      w *= mainCanvas.width; h *= mainCanvas.height;
    }

    const lw = Math.max(1.5, mainCanvas.width / 500);

    // Dolgu
    ctx.fillStyle = hexRgba(color, .12);
    ctx.fillRect(x, y, w, h);

    // Kenarlık
    ctx.strokeStyle = color;
    ctx.lineWidth = lw;
    ctx.strokeRect(x + lw/2, y + lw/2, w - lw, h - lw);

    // Köşe L-bracket'lar
    const cs = Math.min(w, h) * .2;
    ctx.lineWidth = lw * 2.2;
    [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy], i) => {
      ctx.beginPath();
      ctx.moveTo(cx + (i%2===0 ? cs : -cs), cy);
      ctx.lineTo(cx, cy);
      ctx.lineTo(cx, cy + (i<2 ? cs : -cs));
      ctx.stroke();
    });

    // Label
    const fs = Math.max(10, Math.round(mainCanvas.width / 70));
    ctx.font = `700 ${fs}px Syne, sans-serif`;
    const conf = Math.round((det.confidence || 0) * 100);
    const tag  = `${det.label}  ${conf}%`;
    const tw   = ctx.measureText(tag).width + 14;
    const th   = fs + 8;
    const tx   = Math.max(0, Math.min(x, mainCanvas.width - tw));
    const ty   = y > th + 4 ? y - th - 3 : y + 3;

    ctx.fillStyle = color;
    rrect(ctx, tx, ty, tw, th, 4); ctx.fill();
    ctx.fillStyle = '#000'; ctx.textBaseline = 'middle';
    ctx.fillText(tag, tx + 7, ty + th / 2);
  });
}

// ── RENDER RESULTS PANEL ──────────────────────────────────────────
function renderResults(detections, elapsed, isDemo = false) {
  const groups = {};
  detections.forEach(d => {
    const k = d.label.toLowerCase().trim();
    if (!groups[k]) groups[k] = [];
    groups[k].push(d);
  });

  const entries = Object.entries(groups).sort((a,b) => b[1].length - a[1].length);
  const total   = detections.length;

  totalBadge.textContent = total + ' adet';
  resultsMeta.textContent = isDemo ? 'demo' : (elapsed + 'ms');

  if (!entries.length) {
    resultsList.innerHTML = `<div class="empty-state"><div class="ei">🤷</div>Obje bulunamadı.<br>Güven eşiğini düşür veya<br>sınıf listeni kontrol et.</div>`;
    return;
  }

  resultsList.innerHTML = '';
  entries.forEach(([label, items]) => {
    const color = getColor(label);
    const card = document.createElement('div');
    card.className = 'obj-card';
    card.innerHTML = `
      <div class="obj-dot" style="background:${color};box-shadow:0 0 6px ${color}77"></div>
      <div class="obj-name">${label}</div>
      <div>
        <div class="obj-count" style="color:${color}">${items.length}</div>
        <div class="obj-unit">adet</div>
      </div>`;
    resultsList.appendChild(card);
  });

  if (!isDemo) notif(`${total} obje bulundu (${elapsed}ms)`, 'ok');
}

// ── HELPERS ───────────────────────────────────────────────────────
function hexRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}
function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── BOOT ─────────────────────────────────────────────────────────
initSettings();
</script>
