<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>StokSay</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0b0c0e;
      --panel: #141518;
      --border: #222428;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #555;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .logo {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -.5px;
      margin-right: auto;
    }

    .logo span {
      color: var(--accent);
    }

    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .2s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      border-color: var(--accent);
    }

    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 260px;
      min-height: 0;
      overflow: hidden;
    }

    /* ── LEFT ── */
    .view-area {
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
      min-height: 0;
    }

    .canvas-wrap {
      flex: 1;
      position: relative;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0e10;
      cursor: pointer;
      transition: border-color .2s;
      min-height: 0;
    }

    .canvas-wrap.has-content {
      border-color: transparent;
      cursor: default;
    }

    .canvas-wrap:not(.has-content):hover {
      border-color: var(--accent);
    }

    .drop-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      text-align: center;
      pointer-events: none;
      user-select: none;
    }

    .drop-hint .dicon {
      font-size: 40px;
      opacity: .2;
    }

    .drop-hint strong {
      font-size: 15px;
      color: var(--text);
      font-weight: 700;
      display: block;
      margin-bottom: 3px;
    }

    .drop-hint small {
      font-size: 12px;
    }

    #main-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: none;
    }

    #live-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 10;
      background: rgba(11, 12, 14, .82);
      border-radius: calc(var(--radius) - 2px);
    }

    .scan-ring {
      width: 44px;
      height: 44px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .65s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .scan-text {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .scan-line {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      display: none;
      animation: scanline 2s ease-in-out infinite;
      z-index: 5;
    }

    @keyframes scanline {
      0% {
        top: 10%;
        opacity: 0
      }

      10% {
        opacity: 1
      }

      90% {
        opacity: 1
      }

      100% {
        top: 90%;
        opacity: 0
      }
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    .btn {
      flex: 1;
      padding: 12px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: border-color .2s, opacity .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn:hover:not(:disabled) {
      border-color: #3a3b3f;
    }

    .btn:active:not(:disabled) {
      transform: scale(.97);
    }

    .btn:disabled {
      opacity: .28;
      cursor: not-allowed;
    }

    .btn-accent {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-size: 14px;
    }

    .btn-accent:hover:not(:disabled) {
      opacity: .85;
      border-color: var(--accent);
    }

    input[type=file] {
      display: none;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .tab {
      flex: 1;
      padding: 13px 8px;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      cursor: pointer;
      color: var(--muted);
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
    }

    .tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .tab-content {
      flex: 1;
      overflow-y: auto;
      display: none;
      flex-direction: column;
      min-height: 0;
    }

    .tab-content.active {
      display: flex;
    }

    .tab-content::-webkit-scrollbar {
      width: 3px;
    }

    .tab-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    /* RESULTS TAB */
    .results-header {
      padding: 14px 14px 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .total-badge {
      background: var(--accent);
      color: #000;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
    }

    .results-meta {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    .results-list {
      flex: 1;
      padding: 0 10px 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.9;
      padding: 24px 16px;
      gap: 8px;
    }

    .empty-state .ei {
      font-size: 28px;
      opacity: .18;
    }

    /* Obje kartı — sağ özet listesi */
    .obj-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeUp .18s ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(4px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .obj-color-strip {
      width: 4px;
      height: 32px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .obj-info {
      flex: 1;
      min-width: 0;
    }

    .obj-name {
      font-size: 12px;
      font-weight: 700;
      text-transform: capitalize;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .obj-nums {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .obj-count {
      font-family: 'Space Mono', monospace;
      font-size: 22px;
      font-weight: 700;
      line-height: 1;
      flex-shrink: 0;
    }

    /* SETTINGS TAB */
    .settings-body {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .setting-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .setting-group {
      display: flex;
      flex-direction: column;
    }

    .s-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .s-input:focus {
      border-color: var(--accent);
    }

    .s-input::placeholder {
      color: var(--muted);
    }

    .conf-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .conf-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .conf-row span {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      min-width: 32px;
      text-align: right;
    }



    .save-btn {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      padding: 11px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .15s;
    }

    .save-btn:hover {
      opacity: .85;
    }

    /* NOTIF */
    .notif {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: #18191d;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 18px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      color: var(--muted);
      z-index: 999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      pointer-events: none;
      white-space: nowrap;
    }

    .notif.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .notif.ok {
      border-color: #55ffaa;
      color: #55ffaa;
    }

    .notif.err {
      border-color: #ff5555;
      color: #ff5555;
    }

    @media(max-width:660px) {
      body {
        overflow: auto
      }

      main {
        grid-template-columns: 1fr;
        grid-template-rows: 55vw auto
      }

      .right-panel {
        border-left: none;
        border-top: 1px solid var(--border);
        max-height: 340px
      }

      .view-area {
        padding: 12px;
        gap: 10px
      }

      header {
        padding: 12px 16px
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="logo">Stok<span>Say</span></div>
    <button class="icon-btn" id="settings-toggle" title="Ayarlar">⚙️</button>
  </header>

  <main>
    <!-- SOL: Görüntü -->
    <div class="view-area">
      <div class="canvas-wrap" id="canvas-wrap">
        <div class="scan-line" id="scan-line"></div>
        <div class="drop-hint" id="drop-hint">
          <div class="dicon">📦</div>
          <div>
            <strong>Fotoğraf yükle veya sürükle</strong>
            <small>ya da kameradan çek</small>
          </div>
        </div>
        <canvas id="main-canvas"></canvas>
        <video id="live-video" autoplay playsinline muted></video>
        <div class="scan-overlay" id="scan-overlay">
          <div class="scan-ring"></div>
          <div class="scan-text">Analiz ediliyor...</div>
        </div>
      </div>

      <div class="action-row">
        <button class="btn" id="cam-btn">📷 Kamera</button>
        <button class="btn" id="upload-btn">🗂 Yükle</button>
        <button class="btn btn-accent" id="analyze-btn" disabled>🔍 Say</button>
      </div>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- SAĞ: Panel -->
    <div class="right-panel">
      <div class="tabs">
        <button class="tab active" data-tab="results">Sonuçlar</button>
        <button class="tab" data-tab="settings">⚙ Ayarlar</button>
      </div>

      <div class="tab-content active" id="tab-results">
        <div class="results-header">
          <div class="total-badge" id="total-badge">0 adet</div>
          <div class="results-meta" id="results-meta">—</div>
        </div>
        <div class="results-list" id="results-list">
          <div class="empty-state">
            <div class="ei">🔎</div>
            Fotoğraf yükle ve<br>"Say" butonuna bas.
          </div>
        </div>
      </div>

      <div class="tab-content" id="tab-settings">
        <div class="settings-body">
          <div class="setting-group">
            <div class="setting-label">API Endpoint</div>
            <input class="s-input" type="text" id="api-url" placeholder="http://EC2_IP/detect">
          </div>
          <div class="setting-group">
            <div class="setting-label">Güven Eşiği</div>
            <div class="conf-row">
              <input type="range" id="conf-slider" min="10" max="90" value="40" step="5">
              <span id="conf-val">40%</span>
            </div>
          </div>

          <button class="save-btn" id="save-settings">💾 Kaydet</button>
        </div>
      </div>
    </div>
  </main>

  <div class="notif" id="notif"></div>

  <script>
    // ── PALETTE ──────────────────────────────────────────────────────
    const PALETTE = [
      '#4A90FF', '#FF5C5C', '#2ECC71', '#F39C12', '#9B59B6',
      '#1ABC9C', '#E74C3C', '#3498DB', '#F1C40F', '#E67E22',
      '#27AE60', '#8E44AD', '#2980B9', '#D35400', '#16A085',
      '#C0392B', '#7F8C8D', '#2C3E50', '#6C5CE7', '#00B894'
    ];
    const colorMap = {}; let colorIdx = 0;
    function getColor(k) {
      k = k.toLowerCase().trim();
      if (!colorMap[k]) colorMap[k] = PALETTE[colorIdx++ % PALETTE.length];
      return colorMap[k];
    }
    function resetColors() { Object.keys(colorMap).forEach(k => delete colorMap[k]); colorIdx = 0; }

    // ── CONFIG ───────────────────────────────────────────────────────
    const DEFAULT_CLASSES = ['somun', 'vida', 'röle', 'motor yağı', 'filtre', 'conta', 'kablo', 'sigorta'];
    function loadCfg() { try { return JSON.parse(localStorage.getItem('stoksay_cfg') || '{}'); } catch { return {}; } }
    function saveCfg(c) { localStorage.setItem('stoksay_cfg', JSON.stringify(c)); }
    let cfg = loadCfg();
    if (!cfg.apiUrl) cfg.apiUrl = 'http://localhost:8000/detect';
    if (!cfg.conf) cfg.conf = 40;

    // ── REFS ─────────────────────────────────────────────────────────
    const canvasWrap = document.getElementById('canvas-wrap');
    const mainCanvas = document.getElementById('main-canvas');
    const ctx = mainCanvas.getContext('2d');
    const liveVideo = document.getElementById('live-video');
    const dropHint = document.getElementById('drop-hint');
    const scanOverlay = document.getElementById('scan-overlay');
    const scanLine = document.getElementById('scan-line');
    const fileInput = document.getElementById('file-input');
    const uploadBtn = document.getElementById('upload-btn');
    const analyzeBtn = document.getElementById('analyze-btn');
    const camBtn = document.getElementById('cam-btn');
    const resultsList = document.getElementById('results-list');
    const totalBadge = document.getElementById('total-badge');
    const resultsMeta = document.getElementById('results-meta');
    const notifEl = document.getElementById('notif');
    const apiUrlInput = document.getElementById('api-url');
    const confSlider = document.getElementById('conf-slider');
    const confVal = document.getElementById('conf-val');

    const saveBtn = document.getElementById('save-settings');

    let currentImg = null, camStream = null, isLive = false;

    // ── NOTIF ────────────────────────────────────────────────────────
    let nTimer;
    function notif(msg, cls = '') {
      notifEl.textContent = msg; notifEl.className = 'notif show ' + cls;
      clearTimeout(nTimer); nTimer = setTimeout(() => notifEl.classList.remove('show'), 3000);
    }

    // ── TABS ─────────────────────────────────────────────────────────
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
      });
    });
    document.getElementById('settings-toggle').addEventListener('click', () => {
      document.querySelector('.tab[data-tab="settings"]').click();
    });

    // ── SETTINGS ─────────────────────────────────────────────────────
    function initSettings() {
      apiUrlInput.value = cfg.apiUrl;
      confSlider.value = cfg.conf;
      confVal.textContent = cfg.conf + '%';
    }
    confSlider.addEventListener('input', () => confVal.textContent = confSlider.value + '%');
    saveBtn.addEventListener('click', () => {
      cfg.apiUrl = apiUrlInput.value.trim(); cfg.conf = +confSlider.value;
      saveCfg(cfg); notif('Kaydedildi', 'ok');
    });

    // ── IMAGE LOAD ────────────────────────────────────────────────────
    function loadImageEl(imgEl) {
      stopCamera(); currentImg = imgEl; resetColors();
      const wrap = canvasWrap.getBoundingClientRect();
      const scale = Math.min((wrap.width || 600) / imgEl.naturalWidth, (wrap.height || 400) / imgEl.naturalHeight, 1);
      mainCanvas.width = Math.round(imgEl.naturalWidth * scale);
      mainCanvas.height = Math.round(imgEl.naturalHeight * scale);
      ctx.drawImage(imgEl, 0, 0, mainCanvas.width, mainCanvas.height);
      mainCanvas.style.display = 'block';
      liveVideo.style.display = 'none';
      dropHint.style.display = 'none';
      canvasWrap.classList.add('has-content');
      analyzeBtn.disabled = false;
      resultsList.innerHTML = `<div class="empty-state"><div class="ei">🔎</div>"Say" butonuna bas.</div>`;
      totalBadge.textContent = '0 adet'; resultsMeta.textContent = '—';
    }
    function fileToImg(file) {
      return new Promise((res, rej) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); res(img); };
        img.onerror = rej; img.src = url;
      });
    }
    uploadBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', async e => {
      const f = e.target.files[0]; if (!f) return;
      try { loadImageEl(await fileToImg(f)); } catch { notif('Görsel yüklenemedi', 'err'); }
      fileInput.value = '';
    });
    canvasWrap.addEventListener('dragover', e => { e.preventDefault(); if (!canvasWrap.classList.contains('has-content')) canvasWrap.style.borderColor = 'var(--accent)'; });
    canvasWrap.addEventListener('dragleave', () => canvasWrap.style.borderColor = '');
    canvasWrap.addEventListener('drop', async e => {
      e.preventDefault(); canvasWrap.style.borderColor = '';
      const f = e.dataTransfer.files[0];
      if (!f || !f.type.startsWith('image/')) return notif('Sadece görsel yüklenebilir', 'err');
      try { loadImageEl(await fileToImg(f)); } catch { notif('Görsel yüklenemedi', 'err'); }
    });
    canvasWrap.addEventListener('click', () => { if (!canvasWrap.classList.contains('has-content') && !isLive) fileInput.click(); });

    // ── CAMERA ────────────────────────────────────────────────────────
    camBtn.addEventListener('click', async () => {
      if (isLive) { captureFromLive(); return; }
      try {
        camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, audio: false });
        liveVideo.srcObject = camStream;
        liveVideo.style.display = 'block';
        mainCanvas.style.display = 'none';
        dropHint.style.display = 'none';
        canvasWrap.classList.add('has-content');
        scanLine.style.display = 'block';
        isLive = true;
        camBtn.textContent = '📸 Çek';
        camBtn.style.borderColor = 'var(--accent)';
        analyzeBtn.disabled = false;
      } catch { notif('Kamera izni reddedildi', 'err'); }
    });
    function captureFromLive() {
      const w = liveVideo.videoWidth, h = liveVideo.videoHeight;
      const tmp = document.createElement('canvas'); tmp.width = w; tmp.height = h;
      tmp.getContext('2d').drawImage(liveVideo, 0, 0);
      const img = new Image(); img.onload = () => loadImageEl(img);
      img.src = tmp.toDataURL('image/jpeg', .92); stopCamera();
    }
    function stopCamera() {
      if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
      liveVideo.style.display = 'none'; scanLine.style.display = 'none'; isLive = false;
      camBtn.innerHTML = '📷 Kamera'; camBtn.style.borderColor = '';
    }

    // ── ANALYZE ───────────────────────────────────────────────────────
    analyzeBtn.addEventListener('click', async () => {
      if (!currentImg && !isLive) return;
      if (isLive) { captureFromLive(); return; }

      scanOverlay.style.display = 'flex';
      analyzeBtn.disabled = true;

      try {
        const blob = await new Promise(res => mainCanvas.toBlob(res, 'image/jpeg', .92));
        const fd = new FormData();
        fd.append('image', blob, 'frame.jpg');
        fd.append('confidence', (cfg.conf / 100).toString());

        const t0 = Date.now();
        const res = await fetch(cfg.apiUrl, { method: 'POST', body: fd });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const elapsed = Date.now() - t0;

        drawAndNumber(data.detections || []);
        renderResults(data.detections || [], elapsed);
        notif(`${(data.detections || []).length} obje bulundu (${elapsed}ms)`, 'ok');

      } catch (e) {
        if (e.message.includes('fetch') || e.message.includes('Network')) {
          // DEMO MODE
          notif('API yok — Demo mod', 'err');
          demoMode();
        } else {
          notif('Hata: ' + e.message, 'err');
        }
      } finally {
        scanOverlay.style.display = 'none';
        analyzeBtn.disabled = false;
      }
    });

    // ── DEMO MODE ─────────────────────────────────────────────────────
    function demoMode() {
      const W = mainCanvas.width, H = mainCanvas.height;
      const fakeClasses = cfg.classes.slice(0, Math.min(4, cfg.classes.length));
      const fakeDetections = [];
      fakeClasses.forEach(cls => {
        const count = Math.floor(Math.random() * 5) + 1;
        for (let i = 0; i < count; i++) {
          const bw = W * (.08 + Math.random() * .1), bh = H * (.08 + Math.random() * .1);
          const bx = Math.random() * (W - bw), by = Math.random() * (H - bh);
          fakeDetections.push({ label: cls, confidence: .7 + Math.random() * .28, bbox: [bx, by, bw, bh] });
        }
      });
      drawAndNumber(fakeDetections);
      renderResults(fakeDetections, 0, true);
    }

    // ── ÇİZİM: NUMARA + BBOX ─────────────────────────────────────────
    function drawAndNumber(detections) {
      // Görseli sıfırla
      ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
      ctx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);

      resetColors();

      // Her sınıf için sırayla numara ver
      const classCounts = {}; // label → kaçıncı olduğunu tutar

      detections.forEach(det => {
        const color = getColor(det.label);
        let [x, y, w, h] = det.bbox;

        // 0-1 normalize ise pixel'e çevir
        if (x <= 1 && y <= 1 && w <= 1 && h <= 1) {
          x *= mainCanvas.width; y *= mainCanvas.height;
          w *= mainCanvas.width; h *= mainCanvas.height;
        }

        // Numara artır
        if (!classCounts[det.label]) classCounts[det.label] = 0;
        classCounts[det.label]++;
        const num = classCounts[det.label];

        const lw = Math.max(1.5, mainCanvas.width / 600);

        // ── Yarı saydam dolgu ──
        ctx.fillStyle = hexRgba(color, .18);
        ctx.fillRect(x, y, w, h);

        // ── Kenarlık ──
        ctx.strokeStyle = color;
        ctx.lineWidth = lw * 1.5;
        ctx.strokeRect(x + lw / 2, y + lw / 2, w - lw, h - lw);

        // ── Merkez numara balonu (referans fotoğraftaki gibi) ──
        const cx = x + w / 2;
        const cy = y + h / 2;
        const r = Math.max(12, Math.min(w, h) * .28); // balonun yarıçapı, bbox'a göre ölçeklenir

        // Balon arka plan
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        ctx.fillStyle = color;
        ctx.fill();

        // Balon beyaz çerçeve
        ctx.strokeStyle = 'rgba(255,255,255,0.9)';
        ctx.lineWidth = Math.max(1.5, r * 0.12);
        ctx.stroke();

        // Numara yazısı
        const fs = Math.max(9, Math.round(r * 1.1));
        ctx.font = `800 ${fs}px Space Mono, monospace`;
        ctx.fillStyle = '#fff';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Sayıyı gölgeli yaz (okunurluk için)
        ctx.shadowColor = 'rgba(0,0,0,0.5)';
        ctx.shadowBlur = 3;
        ctx.fillText(String(num), cx, cy + 1);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      });
    }

    // ── RESULTS PANEL ─────────────────────────────────────────────────
    function renderResults(detections, elapsed, isDemo = false) {
      const groups = {};
      detections.forEach(d => {
        const k = d.label.toLowerCase().trim();
        if (!groups[k]) groups[k] = [];
        groups[k].push(d);
      });

      const entries = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
      const total = detections.length;

      totalBadge.textContent = total + ' adet';
      resultsMeta.textContent = isDemo ? 'demo' : elapsed + 'ms';

      if (!entries.length) {
        resultsList.innerHTML = `<div class="empty-state"><div class="ei">🤷</div>Obje bulunamadı.<br>Güven eşiğini düşür.</div>`;
        return;
      }

      resultsList.innerHTML = '';
      let globalNum = 0;
      entries.forEach(([label, items]) => {
        const color = getColor(label);
        // Bu sınıfın numara aralığı
        const from = globalNum + 1;
        const to = globalNum + items.length;
        globalNum += items.length;

        const nums = items.length <= 8
          ? Array.from({ length: items.length }, (_, i) => from + i).join(', ')
          : `${from}–${to}`;

        const card = document.createElement('div');
        card.className = 'obj-card';
        card.innerHTML = `
      <div class="obj-color-strip" style="background:${color}"></div>
      <div class="obj-info">
        <div class="obj-name">${label}</div>
        <div class="obj-nums">#${nums}</div>
      </div>
      <div class="obj-count" style="color:${color}">${items.length}</div>`;
        resultsList.appendChild(card);
      });
    }

    // ── HELPERS ───────────────────────────────────────────────────────
    function hexRgba(hex, a) {
      const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    // ── BOOT ─────────────────────────────────────────────────────────
    initSettings();
  </script>
</body>
