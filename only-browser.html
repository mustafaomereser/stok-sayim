<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StokSay — Akıllı Stok Sayım</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0b0c0e;
            --panel: #141518;
            --border: #222428;
            --accent: #e8ff47;
            --text: #f0f0f0;
            --muted: #555;
            --radius: 12px;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: -.5px;
        }

        .logo span {
            color: var(--accent);
        }

        .model-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 28px;
            background: #0f1012;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .model-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: background .3s;
            flex-shrink: 0;
        }

        .status-dot.loading {
            background: #ffcc47;
            animation: pulse .9s infinite;
        }

        .status-dot.ready {
            background: #6bffb8;
        }

        .status-dot.error {
            background: #ff4747;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .conf-wrap {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .conf-wrap input[type=range] {
            accent-color: var(--accent);
            width: 90px;
            cursor: pointer;
        }

        .conf-val {
            color: var(--accent);
            min-width: 28px;
            text-align: right;
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 320px;
            min-height: 0;
        }

        .image-area {
            display: flex;
            flex-direction: column;
            padding: 22px;
            gap: 14px;
            min-height: 0;
        }

        .canvas-wrap {
            flex: 1;
            position: relative;
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s;
            cursor: pointer;
            min-height: 0;
        }

        .canvas-wrap.has-image {
            border-color: transparent;
            cursor: default;
        }

        .canvas-wrap:not(.has-image):hover {
            border-color: var(--accent);
            background: rgba(232, 255, 71, .03);
        }

        .drop-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            color: var(--muted);
            pointer-events: none;
            user-select: none;
            text-align: center;
        }

        .drop-hint .icon {
            font-size: 44px;
            opacity: .25;
        }

        .drop-hint strong {
            display: block;
            font-size: 15px;
            color: var(--text);
            font-weight: 700;
            margin-bottom: 2px;
        }

        .drop-hint span {
            font-size: 12px;
        }

        #main-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(11, 12, 14, .86);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            z-index: 5;
            border-radius: calc(var(--radius) - 2px);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin .6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .overlay-text {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            padding: 12px 14px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--panel);
            color: var(--text);
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: border-color .2s, opacity .2s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn:hover:not(:disabled) {
            border-color: #444;
        }

        .btn:active:not(:disabled) {
            transform: scale(.97);
        }

        .btn:disabled {
            opacity: .32;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .btn-primary:hover:not(:disabled) {
            opacity: .85;
        }

        input[type=file] {
            display: none;
        }

        .results-panel {
            background: var(--panel);
            border-left: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .panel-header {
            padding: 18px 18px 12px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .panel-header h2 {
            font-size: 11px;
            font-weight: 800;
            letter-spacing: .8px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .total-badge {
            background: var(--accent);
            color: #000;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 20px;
        }

        .results-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }

        .results-list::-webkit-scrollbar {
            width: 3px;
        }

        .results-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            font-size: 12px;
            text-align: center;
            line-height: 1.8;
            padding: 32px 16px;
            gap: 8px;
        }

        .empty-state .ei {
            font-size: 30px;
            opacity: .2;
        }

        .obj-card {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 11px 13px;
            display: flex;
            align-items: center;
            gap: 11px;
            animation: fadeUp .2s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(5px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .obj-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .obj-name {
            flex: 1;
            font-size: 12px;
            font-weight: 700;
            text-transform: capitalize;
        }

        .obj-right {
            text-align: right;
        }

        .obj-count {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            line-height: 1;
        }

        .obj-unit {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            color: var(--muted);
            margin-top: 1px;
        }

        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .88);
            z-index: 100;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .modal-bg.open {
            display: flex;
        }

        .modal {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            width: min(92vw, 500px);
        }

        .modal h3 {
            font-size: 15px;
            font-weight: 800;
        }

        #cam-video {
            width: 100%;
            border-radius: 10px;
            background: #000;
            max-height: 320px;
            object-fit: cover;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .notif {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(8px);
            background: #1a1b1e;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--muted);
            z-index: 200;
            opacity: 0;
            transition: opacity .25s, transform .25s;
            pointer-events: none;
            white-space: nowrap;
        }

        .notif.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .notif.err {
            border-color: #ff4747;
            color: #ff7070;
        }

        .notif.ok {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media(max-width:680px) {
            body {
                overflow: auto
            }

            main {
                grid-template-columns: 1fr;
                grid-template-rows: 420px auto
            }

            .results-panel {
                border-left: none;
                border-top: 1px solid var(--border);
                max-height: 300px
            }

            .image-area {
                padding: 14px
            }

            header,
            .model-bar {
                padding-left: 16px;
                padding-right: 16px
            }

            .conf-wrap {
                display: none
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">Stok<span>Say</span></div>
    </header>

    <div class="model-bar">
        <div class="model-status">
            <div class="status-dot loading" id="status-dot"></div>
            <span id="status-text">Model yükleniyor...</span>
        </div>
        <div class="conf-wrap">
            <span>Hassasiyet</span>
            <input type="range" id="conf-slider" min="10" max="90" value="40" step="5">
            <span class="conf-val" id="conf-val">40%</span>
        </div>
    </div>

    <main>
        <div class="image-area">
            <div class="canvas-wrap" id="canvas-wrap">
                <div class="overlay" id="overlay">
                    <div class="spinner"></div>
                    <div class="overlay-text">Analiz ediliyor...</div>
                </div>
                <div class="drop-hint" id="drop-hint">
                    <div class="icon">📦</div>
                    <div>
                        <strong>Fotoğraf yükle veya sürükle</strong>
                        <span>JPG · PNG · WEBP — API key gerekmez</span>
                    </div>
                </div>
                <canvas id="main-canvas"></canvas>
            </div>
            <div class="action-row">
                <button class="btn" id="cam-btn">📷 Kamera</button>
                <button class="btn" id="upload-btn">🗂 Dosya Seç</button>
                <button class="btn btn-primary" id="analyze-btn" disabled>🔍 Analiz Et</button>
            </div>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="results-panel">
            <div class="panel-header">
                <h2>Tespit Edilenler</h2>
                <div class="total-badge" id="total-badge">0 adet</div>
            </div>
            <div class="results-list" id="results-list">
                <div class="empty-state">
                    <div class="ei">🔎</div>
                    Fotoğraf yükleyip<br>Analiz Et'e bas.<br>Her obje ayrı renkle işaretlenir.
                </div>
            </div>
        </div>
    </main>

    <div class="modal-bg" id="cam-modal">
        <div class="modal">
            <h3>📷 Kameradan Çek</h3>
            <video id="cam-video" autoplay playsinline muted></video>
            <div class="modal-actions">
                <button class="btn btn-primary" id="capture-btn" style="flex:1">📸 Çek</button>
                <button class="btn" id="close-cam-btn">✕ Kapat</button>
            </div>
        </div>
    </div>

    <canvas id="hidden-canvas" style="display:none"></canvas>
    <div class="notif" id="notif"></div>

    <!-- TF.js + COCO-SSD via unpkg (daha güvenilir) -->
    <script>
        // Önce script'leri dinamik yükle, hata olursa fallback dene
        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const s = document.createElement('script');
                s.src = src;
                s.onload = resolve;
                s.onerror = reject;
                document.head.appendChild(s);
            });
        }

        const TF_SOURCES = [
            // unpkg
            ['https://unpkg.com/@tensorflow/tfjs@4.10.0/dist/tf.min.js',
                'https://unpkg.com/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js'],
            // jsdelivr
            ['https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js',
                'https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js'],
            // esm.sh
            null // son çare: hata mesajı
        ];

        async function tryLoadLibs() {
            for (const pair of TF_SOURCES) {
                if (!pair) break;
                try {
                    await loadScript(pair[0]);
                    await loadScript(pair[1]);
                    return true;
                } catch (e) {
                    console.warn('CDN başarısız, diğeri deneniyor:', pair[0], e);
                    // temizle
                    ['tf', 'cocoSsd'].forEach(g => { try { delete window[g]; } catch (_) { } });
                }
            }
            return false;
        }

        // ── PALETTE ─────────────────────────────────────────────
        const PALETTE = [
            '#e8ff47', '#47b8ff', '#ff6b6b', '#6bffb8', '#ff9f47',
            '#c47bff', '#ff47c4', '#47ffd4', '#ffcc47', '#7baaff',
            '#ff7b7b', '#47ffaa', '#d4ff47', '#7bf0ff', '#ffb347',
            '#aa47ff', '#ff4790', '#47d4ff', '#b8ff47', '#ff8c47'
        ];
        const colorMap = {}; let colorIdx = 0;
        function getColor(k) { k = k.toLowerCase().trim(); if (!colorMap[k]) colorMap[k] = PALETTE[colorIdx++ % PALETTE.length]; return colorMap[k]; }
        function resetColors() { Object.keys(colorMap).forEach(k => delete colorMap[k]); colorIdx = 0; }

        // ── REFS ────────────────────────────────────────────────
        const canvasWrap = document.getElementById('canvas-wrap');
        const mainCanvas = document.getElementById('main-canvas');
        const ctx = mainCanvas.getContext('2d');
        const dropHint = document.getElementById('drop-hint');
        const overlay = document.getElementById('overlay');
        const fileInput = document.getElementById('file-input');
        const uploadBtn = document.getElementById('upload-btn');
        const analyzeBtn = document.getElementById('analyze-btn');
        const camBtn = document.getElementById('cam-btn');
        const resultsList = document.getElementById('results-list');
        const totalBadge = document.getElementById('total-badge');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const confSlider = document.getElementById('conf-slider');
        const confVal = document.getElementById('conf-val');
        const camModal = document.getElementById('cam-modal');
        const camVideo = document.getElementById('cam-video');
        const captureBtn = document.getElementById('capture-btn');
        const closeCamBtn = document.getElementById('close-cam-btn');
        const hiddenCv = document.getElementById('hidden-canvas');
        const notifEl = document.getElementById('notif');

        let model = null, currentImg = null, stream = null;

        // ── NOTIF ───────────────────────────────────────────────
        let nTimer;
        function notif(msg, cls = '') {
            notifEl.textContent = msg; notifEl.className = 'notif show ' + cls;
            clearTimeout(nTimer); nTimer = setTimeout(() => notifEl.classList.remove('show'), 3500);
        }

        confSlider.addEventListener('input', () => confVal.textContent = confSlider.value + '%');

        // ── INIT: LOAD LIBS + MODEL ──────────────────────────────
        (async () => {
            statusText.textContent = 'Kütüphane yükleniyor...';
            const ok = await tryLoadLibs();
            if (!ok || typeof cocoSsd === 'undefined') {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Kütüphane yüklenemedi — internet bağlantınızı kontrol edin';
                notif('TF.js yüklenemedi', 'err');
                return;
            }
            statusText.textContent = 'Model indiriliyor...';
            try {
                model = await cocoSsd.load({ base: 'mobilenet_v2' });
                statusDot.className = 'status-dot ready';
                statusText.textContent = 'Hazır · COCO-SSD · 80 obje sınıfı';
                if (currentImg) analyzeBtn.disabled = false;
            } catch (e) {
                statusDot.className = 'status-dot error';
                statusText.textContent = 'Model indirilemedi: ' + e.message;
                notif('Model hatası: ' + e.message, 'err');
            }
        })();

        // ── IMAGE LOAD ──────────────────────────────────────────
        function loadImageSrc(src) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                currentImg = img; resetColors();
                const wrap = canvasWrap.getBoundingClientRect();
                const scale = Math.min(wrap.width / img.naturalWidth, (wrap.height || 400) / img.naturalHeight, 1);
                mainCanvas.width = img.naturalWidth * scale;
                mainCanvas.height = img.naturalHeight * scale;
                ctx.drawImage(img, 0, 0, mainCanvas.width, mainCanvas.height);
                mainCanvas.style.display = 'block';
                dropHint.style.display = 'none';
                canvasWrap.classList.add('has-image');
                if (model) analyzeBtn.disabled = false;
                resultsList.innerHTML = `<div class="empty-state"><div class="ei">🔎</div>Analiz Et'e bas.</div>`;
                totalBadge.textContent = '0 adet';
            };
            img.onerror = () => notif('Görsel yüklenemedi', 'err');
            img.src = src;
        }
        function fileToUrl(f) { return new Promise((r, j) => { const rd = new FileReader(); rd.onload = e => r(e.target.result); rd.onerror = j; rd.readAsDataURL(f); }); }

        // ── FILE / DRAG ──────────────────────────────────────────
        uploadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', async e => { const f = e.target.files[0]; if (!f) return; loadImageSrc(await fileToUrl(f)); fileInput.value = ''; });
        canvasWrap.addEventListener('dragover', e => { e.preventDefault(); if (!canvasWrap.classList.contains('has-image')) canvasWrap.style.borderColor = 'var(--accent)'; });
        canvasWrap.addEventListener('dragleave', () => canvasWrap.style.borderColor = '');
        canvasWrap.addEventListener('drop', async e => { e.preventDefault(); canvasWrap.style.borderColor = ''; const f = e.dataTransfer.files[0]; if (!f || !f.type.startsWith('image/')) return notif('Sadece görsel yüklenebilir', 'err'); loadImageSrc(await fileToUrl(f)); });
        canvasWrap.addEventListener('click', () => { if (!canvasWrap.classList.contains('has-image')) fileInput.click(); });

        // ── CAMERA ──────────────────────────────────────────────
        camBtn.addEventListener('click', async () => {
            try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false }); camVideo.srcObject = stream; camModal.classList.add('open'); }
            catch { notif('Kamera izni reddedildi', 'err'); }
        });
        function stopCam() { if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; } camModal.classList.remove('open'); }
        closeCamBtn.addEventListener('click', stopCam);
        captureBtn.addEventListener('click', () => {
            hiddenCv.width = camVideo.videoWidth; hiddenCv.height = camVideo.videoHeight;
            hiddenCv.getContext('2d').drawImage(camVideo, 0, 0);
            loadImageSrc(hiddenCv.toDataURL('image/jpeg', .92));
            stopCam(); notif('Fotoğraf çekildi!', 'ok');
        });

        // ── ANALYZE ─────────────────────────────────────────────
        analyzeBtn.addEventListener('click', async () => {
            if (!model || !currentImg) return;
            overlay.style.display = 'flex'; analyzeBtn.disabled = true;
            try {
                const threshold = confSlider.value / 100;
                const preds = await model.detect(currentImg, 20, threshold);

                // Redraw
                const scaleX = mainCanvas.width / currentImg.naturalWidth;
                const scaleY = mainCanvas.height / currentImg.naturalHeight;
                ctx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                ctx.drawImage(currentImg, 0, 0, mainCanvas.width, mainCanvas.height);

                resetColors();
                const groups = {};
                preds.forEach(p => { const l = p.class.toLowerCase(); if (!groups[l]) groups[l] = []; groups[l].push(p); });

                Object.entries(groups).forEach(([label, items]) => {
                    const color = getColor(label);
                    items.forEach(p => {
                        const [x, y, w, h] = p.bbox;
                        const sx = x * scaleX, sy = y * scaleY, sw = w * scaleX, sh = h * scaleY;
                        const lw = Math.max(2, mainCanvas.width / 350);

                        // fill
                        ctx.fillStyle = hexRgba(color, .13);
                        ctx.fillRect(sx, sy, sw, sh);

                        // border
                        ctx.strokeStyle = color; ctx.lineWidth = lw;
                        ctx.strokeRect(sx + lw / 2, sy + lw / 2, sw - lw, sh - lw);

                        // corner accents
                        const cs = Math.min(sw, sh) * .18;
                        ctx.strokeStyle = color; ctx.lineWidth = lw * 2;
                        [[sx, sy], [sx + sw, sy], [sx, sy + sh], [sx + sw, sy + sh]].forEach(([cx, cy], i) => {
                            ctx.beginPath();
                            ctx.moveTo(cx + (i % 2 === 0 ? cs : -cs), cy);
                            ctx.lineTo(cx, cy);
                            ctx.lineTo(cx, cy + (i < 2 ? cs : -cs));
                            ctx.stroke();
                        });

                        // label
                        const fs = Math.max(10, Math.round(mainCanvas.width / 65));
                        ctx.font = `700 ${fs}px Syne,sans-serif`;
                        const conf = Math.round(p.score * 100);
                        const tag = `${label}  ${conf}%`;
                        const tw = ctx.measureText(tag).width + 14;
                        const th = fs + 8;
                        const tx = Math.max(0, sx);
                        const ty = sy > th + 4 ? sy - th - 3 : sy + 3;
                        ctx.fillStyle = color;
                        rrect(ctx, tx, ty, tw, th, 4); ctx.fill();
                        ctx.fillStyle = '#000'; ctx.textBaseline = 'middle';
                        ctx.fillText(tag, tx + 7, ty + th / 2);
                    });
                });

                renderResults(groups);
            } catch (e) {
                notif('Hata: ' + e.message, 'err'); console.error(e);
            } finally {
                overlay.style.display = 'none'; analyzeBtn.disabled = false;
            }
        });

        function renderResults(groups) {
            const entries = Object.entries(groups).sort((a, b) => b[1].length - a[1].length);
            if (!entries.length) {
                resultsList.innerHTML = `<div class="empty-state"><div class="ei">🤷</div>Obje bulunamadı.<br>Hassasiyeti düşürüp tekrar dene.</div>`;
                totalBadge.textContent = '0 adet'; return;
            }
            const total = entries.reduce((s, [, a]) => s + a.length, 0);
            totalBadge.textContent = total + ' adet';
            resultsList.innerHTML = '';
            entries.forEach(([label, items]) => {
                const color = getColor(label);
                const c = document.createElement('div'); c.className = 'obj-card';
                c.innerHTML = `<div class="obj-dot" style="background:${color};box-shadow:0 0 7px ${color}88"></div><div class="obj-name">${label}</div><div class="obj-right"><div class="obj-count" style="color:${color}">${items.length}</div><div class="obj-unit">adet</div></div>`;
                resultsList.appendChild(c);
            });
        }

        function hexRgba(hex, a) { const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16); return `rgba(${r},${g},${b},${a})`; }
        function rrect(ctx, x, y, w, h, r) { ctx.beginPath(); ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.closePath(); }
    </script>
</body>
